<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Delivery Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            height: 100%;
            font-size: 18px;
        }
        body {
            font-family: sans-serif;
            background: #fff;
            color: #444;
            padding: 2rem;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100%;
            background: radial-gradient(#e5e5e5, transparent) no-repeat 50% 100%;
        }
        h1 { font-size: 2rem; margin-bottom: .5rem; }
        p { font-size: .875rem; color: #777; margin-bottom: 2rem; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            max-width: 600px;
        }
        .card {
            display: block;
            background: #fafafa;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: border-color .15s;
        }
        .card:hover { border-color: #555; }
        .card .provider {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: .4rem;
        }
        .card .provider.cf { color: #f6821f; }
        .card .provider.vimeo { color: #1ab7ea; }
        .card .title { font-size: 1rem; font-weight: 600; }
        .card .sub { font-size: .8rem; color: #666; margin-top: .25rem; }
    </style>
</head>
<body>

    <h1>Video Delivery Comparison</h1>
    <p>Open each page individually for isolated performance measurements.</p>

    <div class="cards">
        <a class="card" href="cloudflarestream-desktop.html">
            <div class="provider cf">Cloudflare Stream</div>
            <div class="title">Desktop Test</div>
            <div class="sub">FCP · LCP · Player Load Time</div>
        </a>
        <a class="card" href="vimeo-desktop.html">
            <div class="provider vimeo">Vimeo</div>
            <div class="title">Desktop Test</div>
            <div class="sub">FCP · LCP · Player Load Time</div>
        </a>
    </div>

</body>
</html>
